services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nakama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nakama}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nakama:
    build:
      context: ./nakama
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/local.yml:/nakama/data/local.yml:ro
    entrypoint:
      - /bin/sh
      - -ecx
      - |
        /nakama/nakama migrate up --database.address ${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-localdb}@postgres:5432/${POSTGRES_DB:-nakama} &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address ${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-localdb}@postgres:5432/${POSTGRES_DB:-nakama}
    ports:
      - "7350:7350"
      - "127.0.0.1:7351:7351"
    restart: unless-stopped

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_NAKAMA_HOST: ${VITE_NAKAMA_HOST:-localhost}
        VITE_NAKAMA_PORT: ${VITE_NAKAMA_PORT:-7350}
        VITE_NAKAMA_SCHEME: ${VITE_NAKAMA_SCHEME:-http}
        NAKAMA_CLIENT_PUBLIC: ${NAKAMA_CLIENT_PUBLIC:-defaultkey}
        NAKAMA_CONNECT_SRC: ${NAKAMA_CONNECT_SRC:-http://localhost:7350 ws://localhost:7350}
    depends_on:
      - nakama
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
