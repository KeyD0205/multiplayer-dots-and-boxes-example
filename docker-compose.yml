services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    build:
      context: ./nakama
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    ports:
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_NAKAMA_HOST: localhost
        VITE_NAKAMA_PORT: 7350
        VITE_NAKAMA_SCHEME: http
        NAKAMA_CLIENT_PUBLIC: defaultkey
    depends_on:
      - nakama
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
