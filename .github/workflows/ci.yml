name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  app:
    name: Test and build apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            nakama/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Type-check client
        run: npx tsc --noEmit
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Install Nakama runtime dependencies
        run: npm ci
        working-directory: nakama

      - name: Type-check Nakama runtime
        run: npx tsc --noEmit
        working-directory: nakama

      - name: Test Nakama runtime
        run: npm test -- --coverage
        working-directory: nakama

      - name: Build Nakama runtime
        run: npm run build
        working-directory: nakama

  containers:
    name: Build containers and validate Nginx
    runs-on: ubuntu-latest
    needs: [app]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=client \
            --cache-to type=gha,scope=client,mode=max \
            -t dots-boxes-web:ci \
            --load \
            ./client

      - name: Build Nakama image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=nakama \
            --cache-to type=gha,scope=nakama,mode=max \
            -t dots-boxes-nakama:ci \
            --load \
            ./nakama

      - name: Validate client Nginx config
        run: docker run --rm dots-boxes-web:ci nginx -t

      - name: Validate edge Nginx config
        run: |
          NAKAMA_CONNECT_SRC="http://localhost:7350 ws://localhost:7350" \
            envsubst '${NAKAMA_CONNECT_SRC}' < nginx/default.conf.template > /tmp/edge-default.conf
          docker run --rm \
            -v "/tmp/edge-default.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t
