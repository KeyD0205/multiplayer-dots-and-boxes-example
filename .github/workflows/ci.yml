name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  app:
    name: Test and build apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            nakama/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Install Nakama runtime dependencies
        run: npm ci
        working-directory: nakama

      - name: Test Nakama runtime
        run: npm test
        working-directory: nakama

      - name: Build Nakama runtime
        run: npm run build
        working-directory: nakama

  containers:
    name: Build containers and validate Nginx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build client image
        run: docker build -t dots-boxes-web:ci ./client

      - name: Build Nakama image
        run: docker build -t dots-boxes-nakama:ci ./nakama

      - name: Validate client Nginx config
        run: docker run --rm -v "$PWD/client/default.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.27-alpine nginx -t

      - name: Validate edge Nginx config
        run: docker run --rm -v "$PWD/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.27-alpine nginx -t
